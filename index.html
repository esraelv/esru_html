<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Boxing Man | Front View</title>
    <style>
        
        body {
            background: linear-gradient(135deg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .bigback {
            background: white;
            border-radius: 28px;
            padding: 0px 28px 35px 28px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
            overflow: hidden;
        }

        .bigback:hover {
            transform: translateY(-3px);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a1a;
            gap: 1rem;
            margin: 0 -28px 25px -28px;
            padding: 15px 28px;
            position: relative;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: rgb(172, 172, 75);
            letter-spacing: 2px;
        }

        .navbar ul {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .navbar ul li a {
            text-decoration: none;
            color: rgb(221, 200, 200);
            font-weight: 600;
            transition: 0.2s;
            font-size: 1rem;
        }

        .navbar ul li a:hover {
            color: yellowgreen;
            border-bottom: 2px solid yellow;
        }

        .image {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .tokko {
            width: 100%;
            max-width: 440px;
            height: auto;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid #ffd700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .tokko:hover {
            transform: scale(1.01);
        }

        .image-title {
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 26px;
            margin: 18px 0 8px 0;
            color: #1b1b31;
            letter-spacing: 1px;
        }

        .IMAGE-view {
            background: #f0f0f0;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .camera-man {
            background-color: #e0e0e0;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .camera-man:hover {
            background-color: #d0d0d0;
            transform: scale(1.02);
        }

        .properties {
            background-color: #dc2626;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .properties:hover {
            background-color: #b91c1c;
            transform: scale(1.02);
        }

        .camera-man:active, .properties:active {
            transform: scale(0.98);
        }

        .footer {
            font-size: 11px;
            color: #888;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="bigback">

    <div class="navbar">
        <div class="logo">Jacob</div>
        <ul>
            <li><a href="#">Work</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

    <div class="image">
        <img src="photo_2025-05-05_12-43-04.jpg" class="tokko" alt="Boxing Man Middle Front View">
    </div>

    <p class="image-title">
        🥊 A BOXING MAN 🥊
    </p>
    
    <div class="IMAGE-view">
        📸 400x300 (PX) Front View 👊
    </div>

    <div class="button-group">
        <button class="camera-man">
            📷 CM: ESRAEL REGASA ✓
        </button>

        <button class="properties">
            📅 DATE 20/08/2018 &nbsp; EC
        </button>
    </div>

    <div class="footer">
        AAAA BBBB CCCC
    </div>
</div>
      
</body>
</html>
